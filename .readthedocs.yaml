# Read the Docs build configuration for the PETSurfer Pipeline docs.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - pip install -r docs/requirements.txt
    build:
      html:
        # Not --strict: the with-pdf plugin ties its own fatal-error behavior to
        # mkdocs' --strict flag and treats the harmless cross-page anchor
        # flattening (needed to merge pages into one PDF) as fatal.
        - ENABLE_PDF_EXPORT=1 mkdocs build --site-dir "$READTHEDOCS_OUTPUT/html"
